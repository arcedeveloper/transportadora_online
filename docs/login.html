<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transportadora Online - Inicio de Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(30, 30, 46, 0.95);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            padding: 2.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        .header h1 {
            font-size: 1.8rem;
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #8892b0;
            font-size: 0.9rem;
            font-weight: 400;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .input-group {
            position: relative;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ccd6f6;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-container {
            position: relative;
            width: 100%;
        }

        .input-group input {
            width: 100%;
            padding: 12px 45px 12px 45px;
            border-radius: 8px;
            border: 2px solid #2d3748;
            background: rgba(45, 55, 72, 0.8);
            color: #ffffff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            height: 48px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00c6ff;
            background: rgba(45, 55, 72, 0.9);
            box-shadow: 0 0 0 3px rgba(0, 198, 255, 0.1);
        }

        .input-group input::placeholder {
            color: #718096;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #00c6ff;
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
            z-index: 2;
        }

.toggle-password {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #718096;
    cursor: pointer;
    font-size: 1.1rem;
    transition: color 0.3s ease;
    padding: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    outline: none;
    box-shadow: none;
}

.toggle-password:focus {
    outline: none;
    box-shadow: none;
}

        button[type="submit"] {
            padding: 1rem;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: #111;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 198, 255, 0.3);
            margin-top: 0.5rem;
            height: 48px;
        }

        button[type="submit"]:hover {
            background: #007aab;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 122, 171, 0.4);
        }

        .register-link {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            color: #8892b0;
        }

        .register-link a {
            color: #00c6ff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #007aab;
            text-decoration: underline;
        }

        #messageBox {
            padding: 0.8rem;
            border-radius: 6px;
            margin: 1rem 0;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
        }

        #messageBox.success {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        #messageBox.error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        #messageBox.info {
            background: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .forgot-password {
            text-align: right;
            margin-top: 0.5rem;
        }

        .forgot-password a {
            color: #718096;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: #00c6ff;
        }
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .container {
                padding: 2rem 1.5rem;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .logo-emoji {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-emoji">📦</div>
            <h1>Iniciar Sesión</h1>
            <p>Accede a tu cuenta de Empresa</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Correo Electrónico</label>
                <div class="input-container">
                    <input type="email" id="correo" name="correo" placeholder="Correo Electronico" required />
                    <i class="fas fa-envelope input-icon"></i>
                </div>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <div class="input-container">
                    <input type="password" id="contraseña" name="contraseña" placeholder="Contraseña" required />
                    <i class="fas fa-lock input-icon"></i>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
                <div class="forgot-password">
                    <a href="#" onclick="alert('Contacta al administrador del sistema para recuperar tu contraseña.')">
                    </a>
                </div>
            </div>

            <button type="submit">Iniciar Sesión</button>
        </form>

        <div id="messageBox"></div>

        <div class="register-link">
            <a href="inicio.html">
                ¿No tienes una cuenta? Regístrate
            </a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('contraseña');
            const icon = document.querySelector('.toggle-password i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.className = 'fas fa-eye';
            } else {
                passwordInput.type = 'password';
                icon.className = 'fas fa-eye-slash';
            }
        }
    </script>
    <script src="login.js"></script>
</body>
</html>
